version: '3.7'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRESS_DB: ${DATABASE_NAME}
    ports:
      - ${DATABASE_PORT}
    volumes:
      - ./docker-data/db:/var/lib/postgresql/data